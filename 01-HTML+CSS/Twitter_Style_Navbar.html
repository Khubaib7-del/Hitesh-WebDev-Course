<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Style NavBar</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #fff;
        }

        .nav-container {
            margin-bottom: 40px;
        }

        h2 {
            margin-bottom: 20px;
            ;
        }

        .nav2{
            background-color: #03643c;
            width: 200px;
            padding: 20px;
        }
        .nav2 ul{
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
    .nav2 li{
        margin-bottom: 12px;
        margin-right: 20px;
    }
    .nav2 a{
        text-decoration: none;
        color: #fff;
        display: block;
        padding: 10px;
        width:100%;
    }
    .nav2 a:hover{
        background-color: #137e0a;
    }
    .nav2 .login-btn{
        background-color: #048a2f;
        color: #fff;
        border: none;
        width: 100%;
        padding: 10px;
        cursor: pointer;
    }
    .nav2 .login-btn:hover{
        background-color: #057017;
        border: 1px solid white;
    }
    </style>
</head>

<body>
    <div class="nav-container">
        <h2>Variation 2: Vertical with hover effect</h2>
        <nav class="nav2">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
            </ul>
            <button class="login-btn">Login</button>
        </nav>
    </div>
</body>

</html>
