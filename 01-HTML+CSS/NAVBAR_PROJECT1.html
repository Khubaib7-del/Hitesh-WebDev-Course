<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar Project 1</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #fff;
        }

        .nav-container {
            margin-bottom: 40px;
            ;
        }

        h2 {
            margin-bottom: 20px;
            ;
        }

        .nav1 {
            background-color: #f8f9fa;
            padding: 10px;
        }

        .nav1 ul {
            list-style-type: none;
            display: flex;
            justify-content: space-around;
            margin: 0;
            padding: 0;
        }

        .nav1 li {
            display: inline;
        }

        .nav1 a {
            text-decoration: none;
            color: #d01212;
            /* background-color: #a53505; */
            padding: 5px 10px;
            position: relative;
        }

        .nav1 a::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #632ee8;
            transform: scaleX(0);
            transition: transform 0.3s ease-in-out;
        }

        .nav1 a:hover::after {
            transform: scaleX(1);
        }

        .nav1 .login-btn {
            background-color: rgb(42, 42, 202);
            color: #fff;
            border: none;
            padding: 5PX 15PX;
            border-radius: 5px;
            cursor: pointer;
            transform: scaleY(-1);
            transition: transform 0.8s ease-in-out;

        }

        .nav1 .login-btn:hover {
            background-color: #171164;
            color: #f8f9fa;
            transform: scaleX(1);

        }
    </style>
</head>

<body>
    <div class="nav-container">
        <h2>Variation 1: Horizontal with underline effect.</h2>
        <nav class="nav1">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
                <li>
                    <button class="login-btn">Login</button>
                </li>
            </ul>
        </nav>
    </div>
</body>

</html>
